---
post:
  summary: "Create Or Publish Tournament"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
      application/zip:
        schema:
          type: string
          format: binary
      application/octet-stream:
        schema:
          type: string
          format: binary

  responses:
    "201":
      description: "Created"
      content:
        application/json:
          schema:
            type: object
    "400":
      description: "Bad Request"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Error.yaml"
    "500":
      description: "Internal Server Error"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Error.yaml"
get:
  summary: "Get Tournaments"
  responses:
    "200":
      description: "Success"
      content:
        application/json:
          schema:
            type: object
    "400":
      description: "Bad Request"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Error.yaml"
    "500":
      description: "Internal Server Error"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Error.yaml"
