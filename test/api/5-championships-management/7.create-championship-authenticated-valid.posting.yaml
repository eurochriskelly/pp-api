name: 7.create-championship-authenticated-valid
method: POST
url: $T_HOST/api/championships
headers:
  - name: Content-Type
    value: application/json
  - name: Authorization
    value: Bearer $TOKEN
body:
  content: |-
    {
      "seriesId": 1,
      "name": "Test Championship Created",
      "year": 2026,
      "numRounds": 5
    }
  content_type: application/json
response:
  json:
    data.id: $CREATED_CHAMPIONSHIP_ID
