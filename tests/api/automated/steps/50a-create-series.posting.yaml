name: 50a.create-series
phase: setup
method: POST
path: /api/series
headers:
  Content-Type: application/json
  Authorization: Bearer $TOKEN
body:
  name: API Test Series $RUN_ID
  description: Test series created by automated tests
  sport: football
expect:
  status: 201
  json:
    - path: data.id
      exists: true
capture:
  SERIES_ID: data.id
