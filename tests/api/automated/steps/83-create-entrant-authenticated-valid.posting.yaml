name: 83.create-entrant-authenticated-valid
phase: setup
method: POST
path: /api/championships/$CHAMPIONSHIP_ID/entrants
headers:
  Content-Type: application/json
  Authorization: Bearer $TOKEN
body:
  entrantType: club
  displayName: New Test Club
  clubId: $TEST_CLUB_ID
expect:
  status: 201
  json:
    - path: data.id
      exists: true
    - path: data.displayName
      equals: New Test Club
